<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BSO Control GUI</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: #eee;
            padding: 20px;
        }
        .panel {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .flex { display: flex; gap: 20px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.9em; color: #aaa; margin-bottom: 4px; }
        input[type="text"], input[type="number"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .status-badge {
            background: #444;
            padding: 10px;
            border-radius: 4px;
            font-size: 1.2em;
            text-align: center;
            flex: 1;
        }
        button {
            background: #007bff;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }

        /* スコアボード */
        .sb-table { border-collapse: collapse; width: 100%; }
        .sb-table th, .sb-table td {
            border: 1px solid #444;
            padding: 6px 8px;
            text-align: center;
            font-size: 0.9em;
            min-width: 36px;
        }
        .sb-table th { background: #333; color: #aaa; }
        .sb-table td.team-name { text-align: left; color: #eee; background: #333; min-width: 100px; }
        .sb-table input.score-input {
            width: 40px;
            background: #222;
            border: 1px solid #555;
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .sb-table td.total-cell { background: #333; font-weight: bold; }
        .sb-table td.total-cell.ok { color: #4caf50; }
        .sb-table td.total-cell.ng { color: #f44336; background: #3a1a1a; }
        .sb-table td.current-inning { background: rgba(255,220,0,0.1); }

        /* 固定フッター */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 10px 20px;
            text-align: right;
            box-sizing: border-box;
            font-size: 0.75rem;
            color: #888;
            pointer-events: none; /* 下の要素の操作を邪魔しない */
            z-index: 1000;
        }
        footer a {
            color: #007bff;
            text-decoration: none;
            pointer-events: auto; /* リンクだけはクリック可能に */
            transition: color 0.2s;
        }
        footer a:hover {
            color: #00bfff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>BSO Control Panel</h1>

    <div class="flex">
        <div class="panel" style="flex: 2;">
            <h2>チーム設定</h2>
            <div class="flex">
                <div class="input-group" style="flex: 1;">
                    <label>先攻チーム名</label>
                    <input type="text" id="top-name" onchange="updateInfo()">
                </div>
                <div class="input-group" style="width: 80px;">
                    <label>得点</label>
                    <input type="text" id="top-score" onchange="updateInfo()">
                </div>
            </div>
            <div class="flex">
                <div class="input-group" style="flex: 1;">
                    <label>後攻チーム名</label>
                    <input type="text" id="bottom-name" onchange="updateInfo()">
                </div>
                <div class="input-group" style="width: 80px;">
                    <label>得点</label>
                    <input type="text" id="bottom-score" onchange="updateInfo()">
                </div>
            </div>
            <div class="flex">
                <div class="input-group" style="flex: 1;">
                    <label>イニング</label>
                    <input type="number" id="inning" onchange="updateInfo()">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>表/裏</label>
                    <select id="isTop" onchange="updateInfo()" style="width:100%; height:35px; background:#333; color:white; border:1px solid #444;">
                        <option value="true">表</option>
                        <option value="false">裏</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="panel" style="flex: 1;">
            <h2>現在のカウント</h2>
            <div style="font-size: 1.5em; line-height: 1.5;">
                <div style="display:flex; align-items:center; gap: 10px;">
                    B: <span id="b-text" style="width:30px; display:inline-block; text-align:center;">0</span>
                    <button onclick="emitAction('addBall')" style="padding: 2px 10px; font-size:0.8em;">＋</button>
                    <button onclick="emitAction('removeBall')" style="padding: 2px 10px; font-size:0.8em; background:#d9534f;">－</button>
                </div>
                <div style="display:flex; align-items:center; gap: 10px; margin-top:5px;">
                    S: <span id="s-text" style="width:30px; display:inline-block; text-align:center;">0</span>
                    <button onclick="emitAction('addStrike')" style="padding: 2px 10px; font-size:0.8em;">＋</button>
                    <button onclick="emitAction('removeStrike')" style="padding: 2px 10px; font-size:0.8em; background:#d9534f;">－</button>
                </div>
                <div style="display:flex; align-items:center; gap: 10px; margin-top:5px;">
                    O: <span id="o-text" style="width:30px; display:inline-block; text-align:center;">0</span>
                    <button onclick="emitAction('addOut')" style="padding: 2px 10px; font-size:0.8em;">＋</button>
                    <button onclick="emitAction('removeOut')" style="padding: 2px 10px; font-size:0.8em; background:#d9534f;">－</button>
                </div>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button onclick="emitAction('resetCounts')" style="background:#f44336; padding: 5px 15px;">BSO全クリア</button>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <label>ランナー</label>
                <div>
                    <input type="checkbox" id="rui1" onchange="updateInfo()"> 1塁
                    <input type="checkbox" id="rui2" onchange="updateInfo()"> 2塁
                    <input type="checkbox" id="rui3" onchange="updateInfo()"> 3塁
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>スコアボード <span style="font-size:0.75em; color:#aaa; font-weight:normal;">— 合計との不一致は赤で表示</span></h2>
        <div id="scoreboard-editor" style="overflow-x: auto;"></div>
    </div>

    <div class="panel">
        <h2>キーバインド設定 (グローバルホットキー)</h2>
        <div id="key-settings" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px;">
            <!-- サーバーから送られてくるキーバインドを表示 -->
        </div>
        <div id="listen-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
            <div style="font-size: 2em; margin-bottom: 20px;">キーを押してください...</div>
            <div id="target-action-name" style="color: #aaa;"></div>
            <button onclick="cancelListen()" style="margin-top: 20px; background: #666;">キャンセル</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentState = {};
        let listeningAction = null;

        socket.on('stateUpdate', (state) => {
            currentState = state;
            renderScoreboard(state);
            document.getElementById('top-name').value = state.teams.top.name;
            document.getElementById('top-score').value = state.teams.top.score;
            document.getElementById('bottom-name').value = state.teams.bottom.name;
            document.getElementById('bottom-score').value = state.teams.bottom.score;
            document.getElementById('inning').value = state.inning;
            document.getElementById('isTop').value = state.isTop.toString();
            
            document.getElementById('b-text').textContent = state.ball;
            document.getElementById('s-text').textContent = state.strike;
            document.getElementById('o-text').textContent = state.out;

            document.getElementById('rui1').checked = state.runners[0];
            document.getElementById('rui2').checked = state.runners[1];
            document.getElementById('rui3').checked = state.runners[2];

            // キーバインド設定の表示
            renderKeySettings(state.keybindings);
        });

        const actionLabels = {
            addBall: "ボール追加",
            addStrike: "ストライク追加",
            addOut: "アウト追加",
            toggleRunner1: "1塁ランナー",
            toggleRunner2: "2塁ランナー",
            toggleRunner3: "3塁ランナー",
            addInning: "イニング増加",
            toggleTopBottom: "表裏切り替え",
            addTopScore: "先攻得点+",
            addBottomScore: "後攻得点+",
            resetCounts: "BSO全クリア"
        };

        function emitAction(action) {
            socket.emit('performAction', action);
        }

        function renderKeySettings(keybindings) {
            const container = document.getElementById('key-settings');
            container.innerHTML = '';
            
            // アクションごとに現在のキーを探す
            Object.entries(actionLabels).forEach(([action, label]) => {
                const currentKeys = Object.entries(keybindings)
                    .filter(([k, v]) => v === action)
                    .map(([k, v]) => k);
                
                const item = document.createElement('div');
                item.className = 'status-badge';
                item.style.textAlign = 'left';
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.style.alignItems = 'center';
                item.innerHTML = `
                    <div>
                        <div style="font-size:0.7em; color:#aaa;">${label}</div>
                        <div style="font-weight:bold;">${currentKeys.join(', ') || '未設定'}</div>
                    </div>
                    <button onclick="startListen('${action}')" style="padding: 5px 10px; font-size: 0.8em;">変更</button>
                `;
                container.appendChild(item);
            });
        }

        function startListen(action) {
            listeningAction = action;
            document.getElementById('target-action-name').textContent = actionLabels[action];
            document.getElementById('listen-modal').style.display = 'flex';
            window.addEventListener('keydown', captureKey);
        }

        function cancelListen() {
            listeningAction = null;
            document.getElementById('listen-modal').style.display = 'none';
            window.removeEventListener('keydown', captureKey);
        }

        function captureKey(e) {
            e.preventDefault();
            const keyName = e.key;
            
            // キャンセル操作
            if (keyName === 'Escape') {
                cancelListen();
                return;
            }

            const newKeybindings = { ...currentState.keybindings };

            // 削除操作
            if (keyName === 'Delete' || keyName === 'Backspace') {
                for (let k in newKeybindings) {
                    if (newKeybindings[k] === listeningAction) {
                        delete newKeybindings[k];
                    }
                }
            } else {
                // 通常の登録操作 (e.code を使用してテンキー等を区別)
                const normalizedKey = e.code;
                
                // 他のアクションに割り当てられていたら消す
                delete newKeybindings[normalizedKey];
                
                // この動作に割り当てられていた古いボタンも整理
                for (let k in newKeybindings) {
                    if (newKeybindings[k] === listeningAction) {
                        delete newKeybindings[k];
                    }
                }
                
                newKeybindings[normalizedKey] = listeningAction;
            }
            
            socket.emit('updateState', { keybindings: newKeybindings });
            cancelListen();
        }

        function renderScoreboard(state) {
            const history = state.scoreHistory || { top: [], bottom: [] };
            const totalInnings = Math.max(state.inning, history.top.length, history.bottom.length, 9);
            const innings = Array.from({ length: totalInnings }, (_, i) => i + 1);

            const topTotal = parseInt(state.teams.top.score) || 0;
            const bottomTotal = parseInt(state.teams.bottom.score) || 0;
            const topHistSum = history.top.reduce((a, b) => a + (parseInt(b) || 0), 0);
            const bottomHistSum = history.bottom.reduce((a, b) => a + (parseInt(b) || 0), 0);

            let html = '<table class="sb-table"><thead><tr>';
            html += '<th></th>';
            innings.forEach(i => { html += `<th>${i}</th>`; });
            html += '<th style="border-left:2px solid #555">合計</th>';
            html += '</tr></thead><tbody>';

            // 先攻行
            html += '<tr>';
            html += `<td class="team-name">${esc(state.teams.top.name)}</td>`;
            innings.forEach(i => {
                const idx = i - 1;
                const val = history.top[idx] != null ? history.top[idx] : "";
                const isCurrent = (i === state.inning && state.isTop);
                html += `<td class="${isCurrent ? 'current-inning' : ''}">
                    <input class="score-input" type="text" value="${val}"
                        data-team="top" data-inning="${idx}"
                        onchange="onScoreEdit(this)">
                </td>`;
            });
            const topOk = topHistSum === topTotal;
            html += `<td class="total-cell ${topOk ? 'ok' : 'ng'}" title="${topOk ? '一致' : `履歴合計:${topHistSum} vs 総得点:${topTotal}`}">${topTotal}${topOk ? '' : ` <span style="font-size:0.8em">(履歴:${topHistSum})</span>`}</td>`;
            html += '</tr>';

            // 後攻行
            html += '<tr>';
            html += `<td class="team-name">${esc(state.teams.bottom.name)}</td>`;
            innings.forEach(i => {
                const idx = i - 1;
                const val = history.bottom[idx] != null ? history.bottom[idx] : "";
                const isCurrent = (i === state.inning && !state.isTop);
                html += `<td class="${isCurrent ? 'current-inning' : ''}">
                    <input class="score-input" type="text" value="${val}"
                        data-team="bottom" data-inning="${idx}"
                        onchange="onScoreEdit(this)">
                </td>`;
            });
            const bottomOk = bottomHistSum === bottomTotal;
            html += `<td class="total-cell ${bottomOk ? 'ok' : 'ng'}" title="${bottomOk ? '一致' : `履歴合計:${bottomHistSum} vs 総得点:${bottomTotal}`}">${bottomTotal}${bottomOk ? '' : ` <span style="font-size:0.8em">(履歴:${bottomHistSum})</span>`}</td>`;
            html += '</tr></tbody></table>';

            document.getElementById('scoreboard-editor').innerHTML = html;
        }

        function onScoreEdit(input) {
            const team = input.dataset.team;
            const idx = parseInt(input.dataset.inning);
            let val = input.value.trim();
            if (val.toUpperCase() === "X") {
                val = "X";
            } else if (val !== "") {
                val = parseInt(val);
                if (isNaN(val) || val < 0) val = 0;
            }
            input.value = val;

            const newHistory = {
                top: [...(currentState.scoreHistory?.top || [])],
                bottom: [...(currentState.scoreHistory?.bottom || [])]
            };
            newHistory[team][idx] = val;
            socket.emit('updateState', { scoreHistory: newHistory });
        }

        function esc(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function updateInfo() {
            let topScore = document.getElementById('top-score').value.trim();
            if (topScore.toUpperCase() === 'X') topScore = 'X';
            else if (topScore !== '') { topScore = parseInt(topScore); if(isNaN(topScore)) topScore = 0; }

            let bottomScore = document.getElementById('bottom-score').value.trim();
            if (bottomScore.toUpperCase() === 'X') bottomScore = 'X';
            else if (bottomScore !== '') { bottomScore = parseInt(bottomScore); if(isNaN(bottomScore)) bottomScore = 0; }

            const newState = {
                teams: {
                    top: { name: document.getElementById('top-name').value, score: topScore },
                    bottom: { name: document.getElementById('bottom-name').value, score: bottomScore }
                },
                inning: parseInt(document.getElementById('inning').value),
                isTop: document.getElementById('isTop').value === 'true',
                runners: [
                    document.getElementById('rui1').checked,
                    document.getElementById('rui2').checked,
                    document.getElementById('rui3').checked
                ]
            };
            socket.emit('updateState', newState);
        }
    </script>
    <footer>
        &copy;どどど素人 <a href="https://x.com/super_amateur_c" target="_blank">dododo-shirouto 2026</a>
    </footer>
</body>
</html>
