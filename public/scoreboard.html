<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard</title>
    <style>
        @font-face {
            font-family: 'LINESeedJP';
            src: url('/assets/LINESeedJP_OTF_Rg.otf');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            overflow: hidden;
            font-family: 'LINESeedJP', sans-serif;
            color: white;
        }

        .container {
            position: relative;
            width: 1920px;
            height: 1080px;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* テキストレイヤー */
        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 9999;
        }

        /* パネル内の表 */
        .scoreboard-wrap {
            position: absolute;
            left: 411px;
            top: 828px;
            width: 1075px;
            height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* チーム行 */
        .row-team {
            display: flex;
            align-items: center;
            height: 80px;
            font-size: 28px;
            font-weight: bold;
        }

        /* チーム名セル */
        .cell-name {
            font-size: 49px;
            width: 184px;
            padding-left: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        /* イニングセル */
        .cell-inning {
            flex: 1;
            text-align: center;
        }

        .cell-inning:nth-child(3n-1) {
            margin-left: 26px;
        }

        /* 合計セル */
        .cell-total {
            width: 72px;
            text-align: center;
            font-size: 34px;
            color: #f5e642;
            flex-shrink: 0;
        }

        .cell-inning.current {
            color: #f5e642;
        }

        .cell-inning.empty {
            color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 背景パネル -->
        <img src="/assets/table_bg.png" class="layer bg-element">
        <!-- 縦線オーバーレイ -->
        <img src="/assets/table_line.png" class="layer">

        <!-- テキストレイヤー -->
        <div class="text-layer">
            <div class="scoreboard-wrap">
                <!-- 先攻行 -->
                <div class="row-team" id="top-row">
                    <!-- JSで生成 -->
                </div>
                <!-- 後攻行 -->
                <div class="row-team" id="bottom-row">
                    <!-- JSで生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // URLパラメータによる背景制御
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('nobg') === 'true') {
            document.querySelectorAll('.bg-element').forEach(el => el.style.display = 'none');
        }

        socket.on('stateUpdate', (state) => {
            render(state);
        });

        function render(state) {
            const history = state.scoreHistory || { top: [], bottom: [] };
            const maxInning = Math.max(state.inning, history.top.length, history.bottom.length, 9);
            const innings = Array.from({ length: maxInning }, (_, i) => i + 1);

            // 先攻行
            const topRow = document.getElementById('top-row');
            topRow.innerHTML =
                `<div class="cell-name">${esc(state.teams.top.name)}</div>` +
                innings.map(i => {
                    const idx = i - 1;
                    const val = history.top[idx];
                    const isCurrent = (i === state.inning && state.isTop);
                    // 現在プレイ中かつ未来のイニングは空表示
                    const isFuture = i > state.inning || (i === state.inning && !state.isTop && state.isTop === false);
                    if (val === undefined || val === null) {
                        return `<div class="cell-inning empty${isCurrent ? ' current' : ''}">-</div>`;
                    }
                    return `<div class="cell-inning${isCurrent ? ' current' : ''}">${val}</div>`;
                }).join('') +
                `<div class="cell-total">${state.teams.top.score}</div>`;

            // 後攻行
            const bottomRow = document.getElementById('bottom-row');
            bottomRow.innerHTML =
                `<div class="cell-name">${esc(state.teams.bottom.name)}</div>` +
                innings.map(i => {
                    const idx = i - 1;
                    const val = history.bottom[idx];
                    const isCurrent = (i === state.inning && !state.isTop);
                    if (val === undefined || val === null) {
                        return `<div class="cell-inning empty${isCurrent ? ' current' : ''}">-</div>`;
                    }
                    return `<div class="cell-inning${isCurrent ? ' current' : ''}">${val}</div>`;
                }).join('') +
                `<div class="cell-total">${state.teams.bottom.score}</div>`;
        }

        function esc(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
    </script>
</body>
</html>
