<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>BSO Display</title>
    <style>
        @font-face {
            font-family: 'LINESeedJP';
            src: url('/assets/LINESeedJP_OTF_Rg.otf');
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'LINESeedJP', sans-serif;
            color: white;
            /* 影はユーザーの指定があれば調整 */
        }

        .container {
            position: relative;
            width: 1920px;
            height: 1080px;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            display: none;
            image-rendering: -webkit-optimize-contrast;
            /* 鮮明に表示 */
        }

        .always-show {
            display: block;
        }

        .active {
            display: block;
        }

        /* テキストレイヤーのコンテナ */
        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 9999;
        }

        /* テキスト要素のスタイル */
        .text-overlay {
            position: absolute;
            white-space: nowrap;
            font-size: 28px;
            font-weight: bold;
        }

        #inning-num {
            left: 1563px;
            top: 875px;
        }

        #top-bottom-kanji {
            left: 1593px;
            top: 875px;
        }

        #team-top-name {
            left: 1537px;
            top: 920px;
        }

        #team-bottom-name {
            left: 1537px;
            top: 957px;
        }

        #score-top {
            right: 270px;
            top: 922px;
            text-align: right;
        }

        #score-bottom {
            right: 270px;
            top: 959px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- レイヤー順: base -> rui -> BSO -> その他 -->
        <img src="/assets/base.png" class="layer always-show">

        <img id="rui1" src="/assets/rui1.png" class="layer">
        <img id="rui2" src="/assets/rui2.png" class="layer">
        <img id="rui3" src="/assets/rui3.png" class="layer">

        <img src="/assets/BSO.png" class="layer always-show">

        <img id="b1" src="/assets/b1.png" class="layer">
        <img id="b2" src="/assets/b2.png" class="layer">
        <img id="b3" src="/assets/b3.png" class="layer">
        <img id="s1" src="/assets/s1.png" class="layer">
        <img id="s2" src="/assets/s2.png" class="layer">
        <img id="o1" src="/assets/o1.png" class="layer">
        <img id="o2" src="/assets/o2.png" class="layer">

        <!-- 表/裏のアイコン？（文字とは別に画像がある場合） -->
        <img id="t-img" src="/assets/t1.png" class="layer">
        <img id="b-img" src="/assets/t2.png" class="layer">

        <!-- テキストレイヤー（1920x1080コンテナで囲んでright/bottom指定可能） -->
        <div class="text-layer">
            <div id="inning-num" class="text-overlay">1</div>
            <div id="top-bottom-kanji" class="text-overlay">表</div>
            <div id="team-top-name" class="text-overlay">先攻</div>
            <div id="team-bottom-name" class="text-overlay">後攻</div>
            <div id="score-top" class="text-overlay">0</div>
            <div id="score-bottom" class="text-overlay">0</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('stateUpdate', (state) => {
            // ボール
            document.getElementById('b1').classList.toggle('active', state.ball >= 1);
            document.getElementById('b2').classList.toggle('active', state.ball >= 2);
            document.getElementById('b3').classList.toggle('active', state.ball >= 3);
            // ストライク
            document.getElementById('s1').classList.toggle('active', state.strike >= 1);
            document.getElementById('s2').classList.toggle('active', state.strike >= 2);
            // アウト
            document.getElementById('o1').classList.toggle('active', state.out >= 1);
            document.getElementById('o2').classList.toggle('active', state.out >= 2);

            // ランナー (baseとBSOの間に表示されるレイヤー)
            document.getElementById('rui1').classList.toggle('active', state.runners[0]);
            document.getElementById('rui2').classList.toggle('active', state.runners[1]);
            document.getElementById('rui3').classList.toggle('active', state.runners[2]);

            // 表裏画像 (t1/t2)
            document.getElementById('t-img').classList.toggle('active', state.isTop);
            document.getElementById('b-img').classList.toggle('active', !state.isTop);

            // テキスト
            document.getElementById('inning-num').textContent = state.inning;
            document.getElementById('top-bottom-kanji').textContent = state.isTop ? '表' : '裏';
            document.getElementById('team-top-name').textContent = state.teams.top.name;
            document.getElementById('team-bottom-name').textContent = state.teams.bottom.name;
            document.getElementById('score-top').textContent = state.teams.top.score;
            document.getElementById('score-bottom').textContent = state.teams.bottom.score;
        });
    </script>
</body>

</html>
